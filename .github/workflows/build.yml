name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-amd64
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
            binary_ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: macos-amd64
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-amd64
            binary_ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Fix AppImage EGL crash
        if: runner.os == 'Linux'
        run: |
          chmod +x fix-appimage.sh
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            ./fix-appimage.sh "$APPIMAGE"
          fi

      - name: Prepare raw binary
        shell: bash
        run: |
          BINARY="src-tauri/target/${{ matrix.target }}/release/animesubs${{ matrix.binary_ext }}"
          if [ -f "$BINARY" ]; then
            cp "$BINARY" "animesubs-${{ matrix.artifact }}${{ matrix.binary_ext }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: animesubs-${{ matrix.artifact }}
          path: |
            animesubs-${{ matrix.artifact }}${{ matrix.binary_ext }}
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/animesubs-*
            **/*.AppImage
            **/*.deb
            **/*.rpm
            **/*.dmg
            **/*.exe
            **/*.msi
